name: Update Crown profile index

on:
  push:
    branches:
      - main
    paths:
      - "profiles/**/*.crown.json"
      - "tools/generate_store_index.py"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: crown-profile-index-main
  cancel-in-progress: false

jobs:
  update-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate index
        run: python tools/generate_store_index.py

      - name: Validate store
        run: python tools/validate_store.py

      - name: Commit generated index
        run: |
          if git diff --quiet -- index/v1.json; then
            echo "Index is already up to date"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index/v1.json
          git commit -m "Update generated Crown profile index"
          git push origin HEAD:main
